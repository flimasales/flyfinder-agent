# Monitor de preços — roda na nuvem (GitHub Actions), grátis.
# A cada 2h, checa 9 combinações de aeroporto em SP (GRU/CGH/VCP × GRU/CGH/VCP)
# em Premium Economy, totalizando 9 buscas por ciclo, pra rota SP→IBZ
# (16/07/2026) + CDG/BRU/AMS→SP (01/08/2026).
# Dispara WhatsApp quando o total estimado ficar até US$ 2.000.
# (Alertas no WhatsApp só são enviados para Premium Economy.)

name: Monitor de Preços

on:
  schedule:
    # 24h por dia, a cada 2h (~360 execuções/mês). 9 buscas por ciclo
    # (9 rotas × 1 classe — Premium Economy). Cada ciclo ~2-3 min,
    # cabendo bem dentro do plano grátis (2.000 min/mês em repo privado).
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      ignorar_horario:
        description: "Ignorar janela 22h–01h (só para teste manual)"
        required: false
        default: false
        type: boolean
      testar_whatsapp:
        description: "Só enviar mensagem de teste (não busca voos)"
        required: false
        default: false
        type: boolean

jobs:
  checar-preco:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache cooldown de alertas
        uses: actions/cache@v4
        with:
          path: .alerta_cache.json
          key: alerta-cache-${{ github.ref_name }}

      - name: Dependências
        run: pip install -r requirements.txt

      - name: Teste WhatsApp (manual)
        if: inputs.testar_whatsapp == true
        env:
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          TZ: America/Sao_Paulo
        run: |
          python buscar_passagens.py \
            --testar-whatsapp \
            --whatsapp 11986185400

      - name: Checar preços e alertar (9 combinações SP × SP)
        if: inputs.testar_whatsapp != true
        env:
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_DRIVE_ID: ${{ secrets.TRAVELPAYOUTS_DRIVE_ID }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          KAYAK_AFFILIATE_ID: ${{ secrets.KAYAK_AFFILIATE_ID }}
          WORKFLOW_URL: "https://github.com/${{ github.repository }}/actions/workflows/monitor-precos.yml"
          TZ: America/Sao_Paulo
        run: |
          EXTRA=""
          if [ "${{ inputs.ignorar_horario }}" = "true" ]; then
            EXTRA="--ignorar-horario"
          fi

          # Aeroportos SP equivalentes: usuário tem flexibilidade pra
          # sair/voltar por GRU (Guarulhos), CGH (Congonhas) ou VCP
          # (Viracopos/Campinas). Itera todas as combinações ida × volta
          # apenas em Premium Economy — única classe com alerta no
          # WhatsApp habilitado.
          # Cooldown é por rota + classe (chave = rota_resumo|classe_label).
          IDAS=("GRU" "CGH" "VCP")
          VOLTAS=("GRU" "CGH" "VCP")
          CLASSE="premium"

          set +e
          FALHAS=0
          EXECUCOES=0
          for IDA in "${IDAS[@]}"; do
            for VOLTA in "${VOLTAS[@]}"; do
              EXECUCOES=$((EXECUCOES + 1))
              echo ""
              echo "==============================================="
              echo "=== Cenário: ${IDA}→IBZ + CDG/BRU/AMS→${VOLTA} (${CLASSE})"
              echo "==============================================="
              python buscar_passagens.py \
                --trecho ${IDA}-IBZ:16/07/2026 \
                --trecho CDG,BRU,AMS-${VOLTA}:01/08/2026 \
                --classe ${CLASSE} \
                --max-escalas 2 \
                --checar-uma-vez \
                --ignorar-horario \
                --whatsapp 11986185400 \
                --preco-min-usd 0 \
                --preco-max-usd 2000 \
                --cooldown 6 \
                $EXTRA
              RC=$?
              if [ $RC -ne 0 ]; then
                echo "[aviso] cenário ${IDA}→IBZ + CDG/BRU/AMS→${VOLTA} (${CLASSE}) saiu com código $RC — seguindo."
                FALHAS=$((FALHAS + 1))
              fi
            done
          done
          echo ""
          echo "=== Fim do ciclo: $EXECUCOES execuções (9 rotas × Premium Economy), $FALHAS falhas ==="
          # Sai 0 se pelo menos uma combinação rodou — falhas individuais
          # são logadas mas não derrubam o job (rotas com cache vazio etc).
          exit 0
