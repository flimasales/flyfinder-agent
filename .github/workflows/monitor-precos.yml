# Monitor de preços — roda na nuvem (GitHub Actions), grátis.
# Janela: 22h–01h horário de Brasília, a cada 30 minutos.
# Dispara WhatsApp quando o total estimado estiver na faixa R$ 10k–12k.

name: Monitor de Preços

on:
  schedule:
    # 24h por dia, a cada 2h (~360 execuções/mês × ~3 min = ~1.080 min/mês)
    # Cabe no plano grátis (limite: 2.000 min/mês em repo privado)
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      ignorar_horario:
        description: "Ignorar janela 22h–01h (só para teste manual)"
        required: false
        default: false
        type: boolean
      testar_whatsapp:
        description: "Só enviar mensagem de teste (não busca voos)"
        required: false
        default: false
        type: boolean

jobs:
  checar-preco:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache cooldown de alertas
        uses: actions/cache@v4
        with:
          path: .alerta_cache.json
          key: alerta-cache-${{ github.ref_name }}

      - name: Dependências
        run: pip install -r requirements.txt

      - name: Teste WhatsApp (manual)
        if: inputs.testar_whatsapp == true
        env:
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          TZ: America/Sao_Paulo
        run: |
          python buscar_passagens.py \
            --testar-whatsapp \
            --whatsapp 11986185400

      - name: Checar preços e alertar
        if: inputs.testar_whatsapp != true
        env:
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_DRIVE_ID: ${{ secrets.TRAVELPAYOUTS_DRIVE_ID }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          KAYAK_AFFILIATE_ID: ${{ secrets.KAYAK_AFFILIATE_ID }}
          WORKFLOW_URL: "https://github.com/${{ github.repository }}/actions/workflows/monitor-precos.yml"
          TZ: America/Sao_Paulo
        run: |
          EXTRA=""
          if [ "${{ inputs.ignorar_horario }}" = "true" ]; then
            EXTRA="--ignorar-horario"
          fi
          python buscar_passagens.py \
            --trecho GRU-IBZ:16/07/2026 \
            --trecho CDG-GRU:01/08/2026 \
            --classe premium \
            --max-escalas 2 \
            --checar-uma-vez \
            --ignorar-horario \
            --whatsapp 11986185400 \
            --preco-min 10000 \
            --preco-max 12000 \
            --cooldown 6 \
            $EXTRA
